# ── CI de tests — workflow APARTE y NO bloqueante ──────────────────────────
# No toca deploy.yml (deploy por SSH a la VPS). Aquí solo corren las pruebas.
# Por ahora un único job `core` (Vitest + MSW, sin Docker). Los jobs `e2e`
# (Playwright, Fase 3) y `db` (Supabase local, Fase 4) se añaden en sus fases.
name: Tests

on:
  pull_request:
  push:
    branches: [main, "feature/**"]

jobs:
  core:
    name: Núcleo del bot (Vitest + MSW)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      # `bun run test` ejecuta el binario de vitest vía su shebang de node
      # (no el runtime de Bun), que es donde MSW intercepta fetch de forma
      # fiable. Node ya viene en los runners de ubuntu.
      - run: bun run test

  e2e:
    name: Web E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - run: bun run build
      - run: bun run test:e2e

  db:
    name: RPC matching (Supabase local)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase start
      # Reaplica migraciones de cero (los tests siembran sus propias fixtures).
      - run: supabase db reset
      - run: bun run test:db
